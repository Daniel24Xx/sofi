<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>🎂 Feliz Cumpleaños Sofía 🥭</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Fondo -->

    <div class="background"></div>

    <div class="stars"></div>

    <div class="moon"></div>

    <!-- Nubes -->

    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <!-- Árbol -->

    <section class="tree-container">

        <img
            src="assets/img/tree.png"
            id="tree"
            draggable="false"
        >

    </section>

    <!-- Mangos -->

    <section class="mangos">

        <img src="assets/img/mango.png" class="mango mango1" draggable="false">
        <img src="assets/img/mango.png" class="mango mango2" draggable="false">
        <img src="assets/img/mango.png" class="mango mango3" draggable="false">
        <img src="assets/img/mango.png" class="mango mango4" draggable="false">
        <img src="assets/img/mango.png" class="mango mango5" draggable="false">

    </section>

    <!-- Panel -->

    <aside class="panel">

        <h1 id="titulo">

            Feliz Cumpleaños

            <span>Sofía</span>

        </h1>

        <div id="mensaje">

            <h2>🥭 Bienvenida</h2>

            <p>

                Presiona el botón para comenzar esta pequeña aventura.

            </p>

        </div>

        <button id="start">

            Comenzar 💛

        </button>

    </aside>

    <!-- Mini reproductor -->

    <div id="miniPlayer">

        <button id="prev">⏮</button>

        <button id="play">▶️</button>

        <button id="next">⏭</button>

        <div id="musicBar">

            <div id="progress"></div>

        </div>

    </div>

    <audio id="audio"></audio>

    <!-- Suelo -->

    <div class="ground">

        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>

    </div>

    <script src="script.js"></script>

</body>

</html>
